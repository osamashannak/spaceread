<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="robots" content="noindex,nofollow">
    <title>Fingerprint Frame</title>
    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            width: 0;
            height: 0;
            overflow: hidden;
        }
    </style>
</head>
<body>
<main id="fingerprint-data">
    <div id="creep-fingerprint"></div>
    <div id="fuzzy-fingerprint"></div>
    <div id="webrtc-connection"></div>
    <div id="status-info"></div>
    <div id="creep-resize"></div>
</main>
<script>
    window.__fingerprintRuntimeError = null;
    window.addEventListener("error", function (event) {
        window.__fingerprintRuntimeError = event.message || "fingerprint runtime error";
    });
    window.addEventListener("unhandledrejection", function (event) {
        var reason = event.reason;
        window.__fingerprintRuntimeError = reason && reason.message ? reason.message : "fingerprint runtime rejected";
    });
</script>
<script src="./creep-runtime.js"></script>
<script>
    (function () {
        var MESSAGE_TYPE = "review-fingerprint-runtime-result";
        var ERROR_TYPE = "review-fingerprint-runtime-error";
        var startedAt = performance.now();
        var intervalId = 0;
        var timeoutId = 0;
        var settled = false;

        function getTargetOrigin() {
            try {
                return document.referrer ? new URL(document.referrer).origin : "*";
            } catch (_) {
                return "*";
            }
        }

        function cloneSerializable(value) {
            if (value === undefined || value === null) {
                return null;
            }

            try {
                return JSON.parse(JSON.stringify(value));
            } catch (_) {
                return null;
            }
        }

        function finish(payload) {
            if (settled) return;
            settled = true;
            clearInterval(intervalId);
            clearTimeout(timeoutId);
            parent.postMessage(payload, getTargetOrigin());
        }

        function readFingerprint() {
            var fingerprint = cloneSerializable(window.Fingerprint);
            var creep = cloneSerializable(window.Creep);

            if (fingerprint || creep) {
                finish({
                    type: MESSAGE_TYPE,
                    duration_ms: Math.max(0, Math.round(performance.now() - startedAt)),
                    fingerprint: fingerprint,
                    creep: creep
                });
            }
        }

        intervalId = setInterval(readFingerprint, 100);
        timeoutId = setTimeout(function () {
            finish({
                type: ERROR_TYPE,
                error: window.__fingerprintRuntimeError || "creep runtime timed out"
            });
        }, 9000);
    })();
</script>
</body>
</html>
